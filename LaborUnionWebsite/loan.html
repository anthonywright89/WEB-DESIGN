<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loan System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section>
        <h2>Apply for a Loan</h2>
        <label for="loanAmount">Enter Loan Amount (5000 or 10000):</label>
        <input type="number" id="loanAmount">
        <button onclick="calculateLoan()">Calculate Loan</button>
        
        <br><br>
        <div id="result" style="font-weight: bold; color: green;"></div>
    </section>

    <script>
        function calculateLoan() {
            let amount = document.getElementById("loanAmount").value;
            let interest = 0;

            if (amount == 5000) { 
                interest = 250; 
            }
            else if (amount == 10000) { 
                interest = 500; 
            }

            let total = parseInt(amount) + interest;
            let installment = total / 10;

            document.getElementById("result").innerHTML = 
            "Total Loan: " + total + "<br>Installment: " + installment;
        }
    </script>
</body>
</html>
